<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>キリシマ 対局ビューア</title>
<style>
  :root{
    --bg:#0d0f12; --panel:#14181d; --fg:#e7e9ea; --muted:#9aa0a6; --line:#232a31;
    --p1:#3da5ff; --p2:#ff5d69; --p3:#ffd23d; --p4:#4dd964; --p5:#b388ff;
  }
  *{box-sizing:border-box}
  html,body{margin:0;background:var(--bg);color:var(--fg);
    font-family:ui-sans-serif,system-ui,-apple-system,"Noto Sans JP",Segoe UI,Roboto,Helvetica,Arial,sans-serif}
  header{padding:12px 16px 0}
  h1{margin:0 0 6px;font-size:18px;letter-spacing:.08em}
  .row{display:flex;flex-wrap:wrap;gap:10px;align-items:center}
  .meta{color:var(--muted);font-size:13px;margin:4px 0 10px}
  button,select,label.file{background:#1b1f24;color:var(--fg);border:1px solid #2c333a;
    padding:7px 11px;border-radius:8px;cursor:pointer;font-size:14px}
  button:hover,select:hover,label.file:hover{border-color:#3a424b}
  button:disabled{opacity:.4;cursor:default}
  input[type=range]{flex:1;min-width:180px;accent-color:var(--p1)}
  main{display:grid;grid-template-columns:auto 320px;gap:18px;padding:10px 16px 24px;align-items:start}
  @media(max-width:820px){main{grid-template-columns:1fr}}
  canvas#board{background:#0f1115;border:1px solid var(--line);border-radius:12px;max-width:100%;height:auto}
  .panel{background:var(--panel);border:1px solid var(--line);border-radius:12px;padding:14px}
  .panel h2{margin:0 0 10px;font-size:13px;color:var(--muted);font-weight:600;letter-spacing:.04em}
  .bar{display:flex;align-items:center;gap:8px;margin:6px 0;font-variant-numeric:tabular-nums}
  .bar .sw{width:12px;height:12px;border-radius:3px;flex:none}
  .bar .name{width:30px;color:var(--fg)}
  .bar .track{flex:1;height:14px;background:#0f1318;border-radius:7px;overflow:hidden}
  .bar .fill{height:100%;border-radius:7px;transition:width .12s linear}
  .bar .val{width:48px;text-align:right;color:var(--fg)}
  .bar.lead .name{font-weight:700}
  .bar.lead::after{content:"●";color:var(--muted);font-size:10px;margin-left:2px}
  canvas#traj{width:100%;height:120px;background:#0f1318;border-radius:8px;margin-top:6px}
  .stats{margin-top:12px;border-top:1px solid var(--line);padding-top:10px;font-size:13px;line-height:1.7}
  .stats b{color:var(--fg)} .stats .k{color:var(--muted)}
  .summary{margin-top:12px;border-top:1px solid var(--line);padding-top:10px;font-size:13px;line-height:1.7;display:none}
  .summary.show{display:block}
  .summary .hl{color:var(--p3);font-weight:700}
  .drop{outline:2px dashed transparent}
  .drop.over{outline-color:var(--p1)}
  details{margin-top:8px;color:var(--muted);font-size:13px}
  textarea{width:100%;height:80px;background:#0f1318;color:var(--fg);border:1px solid #2c333a;border-radius:8px;padding:8px;font-family:ui-monospace,monospace;font-size:12px}
  footer{padding:0 16px 18px;color:var(--muted);font-size:12px;line-height:1.6;max-width:760px}
  kbd{background:#1b1f24;border:1px solid #2c333a;border-radius:5px;padding:1px 6px;font-size:11px}
</style>
</head>
<body class="drop">
<header>
  <h1>キリシマ 対局ビューア</h1>
  <div class="row">
    <label class="file">ログを開く<input id="file" type="file" accept=".json,application/json" hidden></label>
    <button id="first" title="先頭">⏮</button>
    <button id="prev" title="1手戻る">◀</button>
    <button id="play" title="再生/停止">▶ 再生</button>
    <button id="next" title="1手進む">▶</button>
    <button id="last" title="終局">⏭</button>
    <label>速度
      <select id="speed">
        <option value="700">×0.5</option>
        <option value="350" selected>×1</option>
        <option value="170">×2</option>
        <option value="70">×4</option>
      </select>
    </label>
  </div>
  <div class="row" style="margin-top:8px">
    <span id="plyLabel" class="meta" style="margin:0;min-width:96px">手 0 / 0</span>
    <input id="seek" type="range" min="0" max="0" value="0" step="1">
  </div>
  <div id="meta" class="meta">ログ未読込 — 右の「ログを開く」で <code>game.json</code> を読み込むか、ファイルを画面にドロップ。</div>
</header>

<main>
  <div>
    <canvas id="board" width="560" height="560" aria-label="盤面"></canvas>
  </div>
  <div class="panel">
    <h2>スコア（現在手番まで）</h2>
    <div id="bars"></div>
    <h2 style="margin-top:14px">スコア推移</h2>
    <canvas id="traj" width="600" height="240"></canvas>
    <div id="stats" class="stats"></div>
    <div id="summary" class="summary"></div>
    <details>
      <summary>JSONを貼り付けて読み込む</summary>
      <textarea id="paste" placeholder='{"meta":...,"moves":[...]}'></textarea>
      <button id="loadPaste" style="margin-top:6px">読み込む</button>
    </details>
  </div>
</main>

<footer>
  操作：<kbd>Space</kbd> 再生/停止　<kbd>←</kbd>/<kbd>→</kbd> コマ送り。
  白い縁取り＝直近の一手と、それが確定させたマス。指数測定は終局時に下へ展開。<br>
  ログ生成：<code>node selfplay.js 7 3 2000 1 &gt; game.json</code>（N=格子点 P=人数 iters=強さ seed=種）。
</footer>

<script>
const PAL=['', 'var(--p1)','var(--p2)','var(--p3)','var(--p4)','var(--p5)'];
const HEX=['', '#3da5ff','#ff5d69','#ffd23d','#4dd964','#b388ff'];
const $=id=>document.getElementById(id);
let LOG=null, k=0, timer=null;

function hexA(h,a){const n=parseInt(h.slice(1),16);return `rgba(${n>>16&255},${n>>8&255},${n&255},${a})`;}
function scoresAt(kk){return kk>0?LOG.moves[kk-1].score:new Array(LOG.meta.P).fill(0);}
function leaderOf(sc){let mi=-1,mx=0;for(let i=0;i<sc.length;i++)if(sc[i]>mx){mx=sc[i];mi=i;}return mi;} // 0-based, -1=無

function loadLog(obj){
  if(!obj||!obj.meta||!Array.isArray(obj.moves)){alert('対局ログのJSONではないようです。');return;}
  LOG=obj; k=0; stop();
  const seek=$('seek'); seek.max=LOG.moves.length; seek.value=0;
  $('meta').textContent=`N=${LOG.meta.N}（${LOG.meta.M}×${LOG.meta.M}マス=${LOG.meta.cells}）  ${LOG.meta.P}人  iters=${LOG.meta.iters}  seed=${LOG.meta.seed}  全${LOG.moves.length}手`;
  render();
}

function boardState(upto){
  const N=LOG.meta.N,M=N-1;
  const H=Array.from({length:N},()=>new Int8Array(N-1));
  const V=Array.from({length:N-1},()=>new Int8Array(N));
  const cells=Array.from({length:M},()=>new Int8Array(M));
  for(let i=0;i<upto;i++){const m=LOG.moves[i];
    if(m.type==='H')H[m.y][m.x]=m.p; else V[m.y][m.x]=m.p;
    for(const c of m.painted) cells[c[1]][c[0]]=m.p;
  }
  return {N,M,H,V,cells};
}

function drawBoard(){
  const st=boardState(k),{N,M,H,V,cells}=st;
  const cv=$('board'),ctx=cv.getContext('2d'),S=cv.width;
  const margin=26,sp=(S-margin*2)/(N-1);
  const g=(ix,iy)=>[margin+ix*sp,margin+iy*sp];
  ctx.clearRect(0,0,S,S);ctx.fillStyle='#0f1115';ctx.fillRect(0,0,S,S);
  // 塗りマス
  for(let y=0;y<M;y++)for(let x=0;x<M;x++)if(cells[y][x]){const[x0,y0]=g(x,y);ctx.fillStyle=hexA(HEX[cells[y][x]],.20);ctx.fillRect(x0,y0,sp,sp);}
  // 格子
  ctx.lineWidth=1;ctx.strokeStyle='#2c333a';ctx.beginPath();
  for(let i=0;i<N;i++){const[ax,ay]=g(0,i),[bx]=g(N-1,i);ctx.moveTo(ax,ay);ctx.lineTo(bx,ay);const[cx,cy]=g(i,0),[,dy]=g(i,N-1);ctx.moveTo(cx,cy);ctx.lineTo(cx,dy);}
  ctx.stroke();
  // 置かれた線
  ctx.lineWidth=4;ctx.lineCap='round';
  for(let y=0;y<N;y++)for(let x=0;x<N-1;x++)if(H[y][x]){const[x0,yy]=g(x,y),[x1]=g(x+1,y);ctx.strokeStyle=HEX[H[y][x]];ctx.beginPath();ctx.moveTo(x0,yy);ctx.lineTo(x1,yy);ctx.stroke();}
  for(let y=0;y<N-1;y++)for(let x=0;x<N;x++)if(V[y][x]){const[xx,y0]=g(x,y),[,y1]=g(x,y+1);ctx.strokeStyle=HEX[V[y][x]];ctx.beginPath();ctx.moveTo(xx,y0);ctx.lineTo(xx,y1);ctx.stroke();}
  // 直近の一手 & 確定マスを白で強調
  if(k>0){const m=LOG.moves[k-1];
    for(const c of m.painted){const[x0,y0]=g(c[0],c[1]);ctx.strokeStyle='rgba(255,255,255,.85)';ctx.lineWidth=1.5;ctx.strokeRect(x0+1.5,y0+1.5,sp-3,sp-3);}
    ctx.save();ctx.shadowColor='#fff';ctx.shadowBlur=12;ctx.lineWidth=6;ctx.strokeStyle='#fff';ctx.lineCap='round';ctx.beginPath();
    if(m.type==='H'){const[x0,y0]=g(m.x,m.y),[x1]=g(m.x+1,m.y);ctx.moveTo(x0,y0);ctx.lineTo(x1,y0);}
    else{const[x0,y0]=g(m.x,m.y),[,y1]=g(m.x,m.y+1);ctx.moveTo(x0,y0);ctx.lineTo(x0,y1);}
    ctx.stroke();ctx.restore();
  }
  // 格子点
  ctx.fillStyle='#cdd3d8';for(let y=0;y<N;y++)for(let x=0;x<N;x++){const[gx,gy]=g(x,y);ctx.beginPath();ctx.arc(gx,gy,2,0,7);ctx.fill();}
}

function drawTraj(){
  const cv=$('traj'),ctx=cv.getContext('2d'),W=cv.width,H=cv.height,P=LOG.meta.P,T=LOG.moves.length;
  const pad=18,maxS=Math.max(1,...LOG.moves.map(m=>Math.max(...m.score)));
  ctx.clearRect(0,0,W,H);
  ctx.strokeStyle='#222a31';ctx.lineWidth=1;ctx.beginPath();ctx.moveTo(pad,H-pad);ctx.lineTo(W-4,H-pad);ctx.moveTo(pad,4);ctx.lineTo(pad,H-pad);ctx.stroke();
  const X=t=>pad+(W-pad-6)*(T?t/T:0), Y=v=>H-pad-(H-pad-6)*(v/maxS);
  for(let p=1;p<=P;p++){ctx.strokeStyle=HEX[p];ctx.lineWidth=2;ctx.beginPath();ctx.moveTo(X(0),Y(0));
    for(let t=1;t<=k;t++)ctx.lineTo(X(t),Y(LOG.moves[t-1].score[p-1]));ctx.stroke();}
  // 現在位置の縦線
  ctx.strokeStyle='rgba(255,255,255,.35)';ctx.lineWidth=1;ctx.beginPath();ctx.moveTo(X(k),4);ctx.lineTo(X(k),H-pad);ctx.stroke();
}

function drawPanel(){
  const P=LOG.meta.P,T=LOG.moves.length,sc=scoresAt(k),mx=Math.max(1,...sc,1),ld=leaderOf(sc);
  const turn=(k<T)?LOG.moves[k].p:null; // 次に打つ手番
  let bars='';
  for(let p=1;p<=P;p++){const v=sc[p-1],w=Math.round(v/mx*100);
    bars+=`<div class="bar ${ld===p-1?'lead':''}"><span class="sw" style="background:${HEX[p]}"></span>`+
      `<span class="name" style="color:${HEX[p]}">P${p}</span>`+
      `<span class="track"><span class="fill" style="width:${w}%;background:${HEX[p]}"></span></span>`+
      `<span class="val">${v}</span></div>`;}
  $('bars').innerHTML=bars;
  // 指数（現在まで）
  let lc=0,prev=-1;for(let t=1;t<=k;t++){const l=leaderOf(LOG.moves[t-1].score);if(l>=0&&l!==prev){if(prev>=0)lc++;prev=l;}}
  let lastCap=null;for(let i=k-1;i>=0;i--)if(LOG.moves[i].gain>0){lastCap=LOG.moves[i];break;}
  const finalSc=scoresAt(T),winner=leaderOf(finalSc);
  let lockPly=0;for(let t=1;t<=T;t++)if(leaderOf(LOG.moves[t-1].score)!==winner)lockPly=t;
  $('stats').innerHTML=
    `<span class="k">手番</span> <b>${k}/${T}</b>　<span class="k">次手</span> <b style="color:${turn?HEX[turn]:'inherit'}">${turn?'P'+turn:'—'}</b><br>`+
    `<span class="k">首位</span> <b style="color:${ld>=0?HEX[ld+1]:'inherit'}">${ld>=0?'P'+(ld+1):'—'}</b>　<span class="k">首位交代</span> <b>${lc}</b>回<br>`+
    `<span class="k">直近捕獲</span> ${lastCap?`<b style="color:${HEX[lastCap.p]}">P${lastCap.p} +${lastCap.gain}</b> <span class="k">(${lastCap.ply}手目)</span>`:'—'}<br>`+
    `<span class="k">勝者確定</span> <b>${T?(lockPly/T*100).toFixed(0):0}%</b> <span class="k">時点で初めて首位独走</span>`;
  // 終局サマリ
  const sm=$('summary');
  if(k>=T && T>0){
    const ranks=finalSc.map((s,i)=>({p:i+1,score:s})).sort((a,b)=>b.score-a.score);
    const lastP=ranks[P-1].p,cut=Math.floor(T*0.75);
    let lastEnd=0,lastAct=false;for(const m of LOG.moves)if(m.ply>cut&&m.p===lastP&&m.gain>0){lastEnd+=m.gain;lastAct=true;}
    let big={size:0,p:0};for(const m of LOG.moves)if(m.gain>big.size)big={size:m.gain,p:m.p};
    const bigRank=ranks.findIndex(r=>r.p===big.p)+1;
    const rk=ranks.map((r,i)=>`<b style="color:${HEX[r.p]}">${i+1}位 P${r.p}:${r.score}</b>`).join('　');
    sm.className='summary show';
    sm.innerHTML=`<span class="k">— 終局 —</span><br>${rk}<br>`+
      `<span class="k">差</span> m12=<b>${ranks[0].score-ranks[1].score}</b> / m23=<b>${ranks[1].score-ranks[P-1].score}</b>　`+
      `<span class="k">勝者確定</span> <b>${(lockPly/T*100).toFixed(0)}%</b><br>`+
      `<span class="k">最下位(P${lastP})の終盤関与</span> <span class="hl">${lastAct?`有 +${lastEnd}`:'無'}</span>　`+
      `<span class="k">最大捕獲</span> <b>${big.size}</b>マス by <b style="color:${HEX[big.p]}">P${big.p}</b>（${bigRank}位${big.p===lastP?'＝最下位!':''}）`;
  } else sm.className='summary';
}

function render(){
  if(!LOG)return;
  $('seek').value=k;
  $('plyLabel').textContent=`手 ${k} / ${LOG.moves.length}`;
  drawBoard();drawTraj();drawPanel();
  $('play').textContent=timer?'❚❚ 停止':'▶ 再生';
  $('prev').disabled=$('first').disabled=(k<=0);
  $('next').disabled=$('last').disabled=(k>=LOG.moves.length);
}

function go(kk){if(!LOG)return;k=Math.max(0,Math.min(LOG.moves.length,kk));render();}
function step(d){go(k+d);if(LOG&&k>=LOG.moves.length)stop();}
function play(){if(!LOG)return;if(timer)return stop();if(k>=LOG.moves.length)k=0;
  timer=setInterval(()=>step(1),+$('speed').value);render();}
function stop(){if(timer){clearInterval(timer);timer=null;}render();}

$('file').addEventListener('change',e=>{const f=e.target.files[0];if(!f)return;
  const r=new FileReader();r.onload=()=>{try{loadLog(JSON.parse(r.result));}catch(err){alert('JSON解析に失敗: '+err.message);}};r.readAsText(f);});
$('loadPaste').addEventListener('click',()=>{try{loadLog(JSON.parse($('paste').value));}catch(err){alert('JSON解析に失敗: '+err.message);}});
$('play').addEventListener('click',play);
$('first').addEventListener('click',()=>{stop();go(0);});
$('last').addEventListener('click',()=>{stop();go(LOG?LOG.moves.length:0);});
$('prev').addEventListener('click',()=>{stop();step(-1);});
$('next').addEventListener('click',()=>{stop();step(1);});
$('seek').addEventListener('input',e=>{stop();go(+e.target.value);});
$('speed').addEventListener('change',()=>{if(timer){stop();play();}});
document.addEventListener('keydown',e=>{if(e.target.tagName==='TEXTAREA')return;
  if(e.code==='Space'){e.preventDefault();play();}else if(e.code==='ArrowLeft'){stop();step(-1);}else if(e.code==='ArrowRight'){stop();step(1);}});
// ドラッグ&ドロップ
const body=document.body;
['dragenter','dragover'].forEach(ev=>body.addEventListener(ev,e=>{e.preventDefault();body.classList.add('over');}));
['dragleave','drop'].forEach(ev=>body.addEventListener(ev,e=>{e.preventDefault();if(ev==='dragleave'&&e.relatedTarget)return;body.classList.remove('over');}));
body.addEventListener('drop',e=>{const f=e.dataTransfer.files[0];if(!f)return;
  const r=new FileReader();r.onload=()=>{try{loadLog(JSON.parse(r.result));}catch(err){alert('JSON解析に失敗: '+err.message);}};r.readAsText(f);});
</script>
</body>
</html>
